run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - noctx
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: github.com/alegutko/issuetracker

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
