<!doctype html>
<html lang="en" data-mode="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zdzira — Board</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" />
    <script type="module" src="js/board.js"></script>
  </head>
  <body>
    <div class="app app--board">
      <pug src="includes/topbar.pug" />
      <pug src="includes/toolbar.pug" />
      <pug src="includes/board-shell.pug" />
    </div>
    <aside class="issue-panel"
           id="issuePanel"
           hx-ext="client-side-templates"
           handlebars-template="tmpl-issue-panel"
           hx-swap="innerHTML"
           hx-on::after-swap="this.hidden = false"
           hidden></aside>
    <pug src="includes/statusbar.pug" />
    <pug src="includes/shared-modal.pug" />
    <pug src="templates/topbar-template.pug" />
    <pug src="templates/board-templates.pug" />
    <pug src="templates/index-templates.pug" />
  </body>
</html>
