server {
    listen 80;
    server_name _;

    # Static frontend
    root /usr/share/nginx/html;
    index board_mockup.html;

    location / {
        try_files $uri $uri/ /board_mockup.html;
    }

    # REST API — strip /api prefix before forwarding
    location /api/ {
        proxy_pass         http://backend:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # MCP SSE — disable buffering so server-sent events flow through
    location /mcp {
        proxy_pass             http://backend:8080/mcp;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       Connection        '';
        proxy_buffering        off;
        proxy_cache            off;
        chunked_transfer_encoding on;
    }

    # OpenAPI docs and schema (served directly by backend)
    location /docs {
        proxy_pass         http://backend:8080/docs;
        proxy_set_header   Host $host;
    }

    location /openapi.json {
        proxy_pass         http://backend:8080/openapi.json;
        proxy_set_header   Host $host;
    }
}
