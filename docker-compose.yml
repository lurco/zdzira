services:
  backend:
    build: .
    restart: unless-stopped
    volumes:
      - db-data:/data
    environment:
      BASE_URL: http://localhost:3400/mcp
    expose:
      - "8080"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "3400:80"
    depends_on:
      - backend

volumes:
  db-data:
