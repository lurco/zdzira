services:
  backend:
    build: .
    restart: unless-stopped
    volumes:
      - db-data:/data
    environment:
      BASE_URL: http://localhost/mcp
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  db-data:
