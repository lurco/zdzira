# Applied automatically by `docker compose up` — dev only.
# Frontend is served by the Vite dev server on :5173 with full HMR.
# nginx is not used in dev; access the app on http://localhost:5173.
#
# Production: docker compose -f docker-compose.yml up --build

services:
  backend:
    ports:
      - "8080:8080"

  nginx:
    build: !reset null
    image: nginx:alpine
    entrypoint: ["echo", "nginx disabled in dev — use :5173"]
    restart: "no"

  frontend:
    image: node:22-alpine
    working_dir: /app
    environment:
      VITE_BACKEND_URL: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
